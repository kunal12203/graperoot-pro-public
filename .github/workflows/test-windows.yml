name: Windows install smoke test

on:
  workflow_dispatch:
    inputs:
      license_key:
        description: "License key (GRP-XXXX-XXXX-XXXX)"
        required: true
        type: string
  push:
    paths:
      - install.ps1
      - bin/launch_pro.ps1
      - bin/dgc-pro.ps1
      - bin/dgc-pro.cmd
      - .github/workflows/test-windows.yml
      - .github/workflows/scripts/verify-install.ps1

jobs:
  ps51:
    name: PowerShell 5.1
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show env
        shell: powershell
        run: |
          $PSVersionTable
          python --version
      - name: Install
        shell: powershell
        env:
          GRAPEROOT_LICENSE_KEY: ${{ inputs.license_key }}
        run: |
          $ProgressPreference = "SilentlyContinue"
          irm https://graperoot.dev/pro/install.ps1 | iex
      - name: Verify
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github/workflows/scripts/verify-install.ps1

  pwsh7:
    name: PowerShell 7
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        shell: pwsh
        env:
          GRAPEROOT_LICENSE_KEY: ${{ inputs.license_key }}
        run: |
          $ProgressPreference = "SilentlyContinue"
          irm https://graperoot.dev/pro/install.ps1 | iex
      - name: Verify
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .github/workflows/scripts/verify-install.ps1

  ubuntu:
    name: Ubuntu (apt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        env:
          GRAPEROOT_LICENSE_KEY: ${{ inputs.license_key }}
        run: |
          # ripgrep is preinstalled on ubuntu-latest, python3 too
          rg --version | head -1 || sudo apt-get install -y ripgrep
          curl -fsSL https://graperoot.dev/pro/install.sh | bash -s -- "$GRAPEROOT_LICENSE_KEY"
      - name: Verify
        run: bash .github/workflows/scripts/verify-install.sh

  fedora:
    name: Fedora (dnf in container)
    runs-on: ubuntu-latest
    container: fedora:40
    steps:
      - uses: actions/checkout@v4
      - name: Install
        env:
          GRAPEROOT_LICENSE_KEY: ${{ inputs.license_key }}
        run: |
          dnf install -y python3.11 python3.11-devel ripgrep curl tar gzip findutils >/dev/null
          curl -fsSL https://graperoot.dev/pro/install.sh | bash -s -- "$GRAPEROOT_LICENSE_KEY"
      - name: Verify
        run: bash .github/workflows/scripts/verify-install.sh
