name: Windows install smoke test

on:
  workflow_dispatch:
    inputs:
      license_key:
        description: "License key (GRP-XXXX-XXXX-XXXX)"
        required: true
        type: string
  push:
    paths:
      - install.ps1
      - bin/launch_pro.ps1
      - bin/dgc-pro.ps1
      - bin/dgc-pro.cmd
      - .github/workflows/test-windows.yml
      - .github/workflows/scripts/verify-install.ps1

jobs:
  ps51:
    name: PowerShell 5.1
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show env
        shell: powershell
        run: |
          $PSVersionTable
          python --version
      - name: Install
        shell: powershell
        env:
          GRAPEROOT_LICENSE_KEY: ${{ inputs.license_key }}
        run: |
          $ProgressPreference = "SilentlyContinue"
          irm https://graperoot.dev/pro/install.ps1 | iex
      - name: Verify
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github/workflows/scripts/verify-install.ps1

  pwsh7:
    name: PowerShell 7
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        shell: pwsh
        env:
          GRAPEROOT_LICENSE_KEY: ${{ inputs.license_key }}
        run: |
          $ProgressPreference = "SilentlyContinue"
          irm https://graperoot.dev/pro/install.ps1 | iex
      - name: Verify
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .github/workflows/scripts/verify-install.ps1
